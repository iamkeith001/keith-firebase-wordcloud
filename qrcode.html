<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code — 文字雲工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 32px;
    }
    h1 {
      color: white;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .cards {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      min-width: 260px;
    }
    .card-icon { font-size: 40px; }
    .card-title {
      font-size: 20px;
      font-weight: 900;
      color: #222;
      text-align: center;
    }
    .qr-box {
      background: white;
      padding: 12px;
      border-radius: 12px;
      border: 3px solid #f0f0f0;
    }
    .card-url {
      font-size: 11px;
      color: #999;
      text-align: center;
      word-break: break-all;
      max-width: 220px;
    }
    .card-desc {
      font-size: 13px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }
    .pill {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }
    .pill-submit { background: linear-gradient(135deg, #667eea, #764ba2); }
    .pill-display { background: linear-gradient(135deg, #1a1a2e, #302b63); }

    .tip {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      text-align: center;
      background: rgba(0,0,0,0.15);
      padding: 12px 24px;
      border-radius: 30px;
      max-width: 520px;
    }

    @media print {
      body { background: white; padding: 20px; }
      h1 { color: #333; text-shadow: none; }
      .tip { display: none; }
      .cards { gap: 40px; }
    }
    @media (max-width: 600px) {
      .cards { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <h1>📱 掃碼加入文字雲</h1>

  <div class="cards">
    <!-- 學生提交頁 -->
    <div class="card">
      <span class="card-icon">✏️</span>
      <div class="card-title">學生提交頁</div>
      <span class="pill pill-submit">掃我來輸入關鍵字</span>
      <div class="qr-box">
        <div id="qr-submit"></div>
      </div>
      <div class="card-desc">學生用手機掃描<br>輸入關鍵字送出</div>
      <div class="card-url" id="url-submit"></div>
    </div>

    <!-- 展示頁 -->
    <div class="card">
      <span class="card-icon">☁️</span>
      <div class="card-title">文字雲展示頁</div>
      <span class="pill pill-display">投影給全班看</span>
      <div class="qr-box">
        <div id="qr-display"></div>
      </div>
      <div class="card-desc">老師投影展示<br>關鍵字即時出現</div>
      <div class="card-url" id="url-display"></div>
    </div>
  </div>

  <div class="tip">💡 列印提示：按 Ctrl+P（或 ⌘P）即可印出，背景會自動轉白色</div>

  <!-- QR Code 產生器 (純前端，無需安裝) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const BASE = 'https://iamkeith001.github.io/keith-firebase-wordcloud';
    const SUBMIT_URL  = BASE + '/';
    const DISPLAY_URL = BASE + '/display.html';

    function makeQR(divId, url, colorDark) {
      new QRCode(document.getElementById(divId), {
        text: url,
        width: 200,
        height: 200,
        colorDark: colorDark,
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    makeQR('qr-submit',  SUBMIT_URL,  '#5a4fcf');
    makeQR('qr-display', DISPLAY_URL, '#1a1a2e');

    document.getElementById('url-submit').textContent  = SUBMIT_URL;
    document.getElementById('url-display').textContent = DISPLAY_URL;
  </script>
</body>
</html>
