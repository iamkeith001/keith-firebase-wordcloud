<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code — 文字雲工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 24px;
    }
    h1 { color: white; font-size: 28px; font-weight: 900; text-align: center; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .session-info {
      color: rgba(255,255,255,0.9);
      font-size: 15px;
      background: rgba(0,0,0,0.2);
      padding: 8px 24px;
      border-radius: 30px;
      text-align: center;
    }
    .session-info strong { letter-spacing: 3px; font-size: 20px; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      min-width: 260px;
    }
    .card-icon { font-size: 40px; }
    .card-title { font-size: 20px; font-weight: 900; color: #222; }
    .pill {
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }
    .pill-submit  { background: linear-gradient(135deg, #667eea, #764ba2); }
    .qr-box { padding: 12px; border-radius: 12px; border: 3px solid #f0f0f0; }
    .card-desc { font-size: 13px; color: #666; text-align: center; line-height: 1.7; }
    .card-url  { font-size: 11px; color: #bbb; text-align: center; word-break: break-all; max-width: 220px; }
    .no-session {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .no-session .icon { font-size: 56px; margin-bottom: 16px; }
    .no-session p { color: #888; font-size: 16px; line-height: 1.8; }
    .tip {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      text-align: center;
      background: rgba(0,0,0,0.15);
      padding: 10px 22px;
      border-radius: 30px;
    }
    @media print {
      body { background: white; padding: 20px; gap: 16px; }
      h1, .session-info { color: #333; text-shadow: none; }
      .session-info { background: #f3f4f6; }
      .tip { display: none; }
    }
  </style>
</head>
<body>
  <h1>📱 掃碼加入文字雲</h1>

  <div id="withSession" style="display:contents">
    <div class="session-info" id="sessionInfo"></div>

    <div class="card">
      <span class="card-icon">✏️</span>
      <div class="card-title">學生提交頁</div>
      <span class="pill pill-submit">掃我來輸入關鍵字</span>
      <div class="qr-box">
        <div id="qr-box"></div>
      </div>
      <div class="card-desc">學生用手機掃描<br>輸入關鍵字送出</div>
      <div class="card-url" id="submitUrl"></div>
    </div>

    <div class="tip">💡 按 ⌘P 可列印，背景會自動轉白色</div>
  </div>

  <div id="noSession" style="display:none">
    <div class="no-session">
      <div class="icon">🔗</div>
      <p>請從「文字雲展示頁」<br>點擊「QR Code」按鈕開啟此頁<br>或加上 ?s=場次碼 開啟</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const BASE = 'https://iamkeith001.github.io/keith-firebase-wordcloud';
    const params = new URLSearchParams(location.search);
    const sessionId = params.get('s');

    if (!sessionId) {
      document.getElementById('withSession').style.display = 'none';
      document.getElementById('noSession').style.display   = 'block';
    } else {
      const code = sessionId.toUpperCase();
      const submitUrl = `${BASE}/index.html?s=${sessionId}`;

      document.getElementById('sessionInfo').innerHTML = `場次代碼&ensp;<strong>${code}</strong>`;
      document.getElementById('submitUrl').textContent = submitUrl;

      new QRCode(document.getElementById('qr-box'), {
        text: submitUrl,
        width: 220,
        height: 220,
        colorDark: '#5a4fcf',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  </script>
</body>
</html>
