<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時文字雲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0c29;
      background: linear-gradient(to bottom right, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
    }
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    header h1 {
      color: white;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #canvas-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    canvas { display: block; }
    .empty-state {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state p { font-size: 18px; }
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 12px 22px;
      border-radius: 40px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s;
      z-index: 20;
    }
    .fab:hover { background: rgba(255,255,255,0.28); }
    .pulse-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <header>
    <h1>☁️ 即時文字雲</h1>
    <span class="badge"><span class="pulse-dot"></span><span id="count">載入中...</span></span>
  </header>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">✏️</div>
    <p>還沒有關鍵字，快去提交吧！</p>
  </div>

  <a href="index.html" class="fab">✏️ 提交關鍵字</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import {
      getFirestore, collection, onSnapshot
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA3vAs6DAG8ff8zmA1tytvVa0_T1Xn3WBs",
      authDomain: "keith-firebase.firebaseapp.com",
      projectId: "keith-firebase",
      storageBucket: "keith-firebase.firebasestorage.app",
      messagingSenderId: "954257745716",
      appId: "1:954257745716:web:d16da2701ae5da6ca2e761"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('canvas');
    const emptyState = document.getElementById('emptyState');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); renderCloud(); });

    const COLORS = [
      '#ff6b6b','#ffd93d','#6bcb77','#4d96ff',
      '#c77dff','#ff9a3c','#00d2ff','#ff6eb4',
      '#a8ff78','#f9ca24','#6ab04c','#e056fd'
    ];

    let wordData = [];
    let renderTimer = null;

    function renderCloud() {
      if (wordData.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      const maxCount = wordData[0][1];
      WordCloud(canvas, {
        list: wordData,
        gridSize: Math.max(8, Math.round(14 * canvas.width / 1280)),
        weightFactor: (n) => {
          const ratio = n / maxCount;
          const base  = canvas.width / 10;
          return Math.max(18, Math.round(base * (0.3 + 0.7 * ratio)));
        },
        fontFamily: '"Noto Sans TC", "Microsoft JhengHei", sans-serif',
        color: () => COLORS[Math.floor(Math.random() * COLORS.length)],
        rotateRatio: 0.25,
        rotationSteps: 2,
        backgroundColor: 'transparent',
        drawOutOfBound: false,
        shrinkToFit: true,
        wait: 10,
      });
    }

    onSnapshot(collection(db, 'wordcloud_words'), (snapshot) => {
      const freq = {};
      snapshot.forEach(doc => {
        const w = (doc.data().word || '').trim();
        if (w) freq[w] = (freq[w] || 0) + 1;
      });

      wordData = Object.entries(freq).sort((a, b) => b[1] - a[1]);
      const total = snapshot.size;
      document.getElementById('count').textContent =
        total === 0 ? '尚無關鍵字' : `共 ${total} 個關鍵字`;

      clearTimeout(renderTimer);
      renderTimer = setTimeout(renderCloud, 400);
    });
  </script>
</body>
</html>
